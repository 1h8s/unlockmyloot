# Конфиг воркера-счётчика UnlockMyLoot.
# KV id не менять — оттуда подтянется текущее значение при миграции на DO.
name = "unlockmyloot"
main = "counter-worker.js"
compatibility_date = "2026-06-01"

routes = [
  { pattern = "api.unlockmyloot.com", custom_domain = true }
]

[[kv_namespaces]]
binding = "COUNTER"
id = "4d93f48984724c4d87a1158e99257356"

[[durable_objects.bindings]]
name = "COUNTER_DO"
class_name = "Counter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Counter"]
